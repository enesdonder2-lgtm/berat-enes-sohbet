        .context-menu.active { display: block; }
        .context-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .context-item:hover { background: rgba(0,0,0,0.05); }
        
        .recording-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2500;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .recording-overlay.active { display: flex; }
        .recording-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ff4444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            animation: recordingPulse 1s infinite;
        }
        @keyframes recordingPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,68,68,0.7); }
            50% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(255,68,68,0); }

        .recording-time {

            margin-top: 20px;

        .contact-panel {
            position: fixed;

            background: var(--bg-color);
            z-index: 1500;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }
        .contact-panel.active { right: 0; }
        .contact-header {
            background: var(--header-bg);
            color: white;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            display: flex;

        .contact-avatar {
            width: 80px; height: 80px;
            border-radius: 50%;

        .image-viewer {
            display: none;

            max-height: 80%;

        .image-viewer-close {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));

        .toast {

            transform: translateX(-50%) translateY(100px);

</head>
<body>
    <div class="container">
        <div class="bg-pattern"></div>
        
        <!-- LOGIN SCREEN -->
        <div class="login-screen" id="loginScreen">
            <div class="login-box">
                <h1>💕</h1>
                <p class="subtitle">Berat ❤️ Enes</p>
                <div class="day-counter">
                    <div class="number" id="dayCount">0</div>
                    <div class="label">gündür birlikteyiz</div>
                    <div style="color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 8px;">9 Ocak 2025'ten beri</div>
                </div>
                <div class="password-input-wrapper">
                    <input type="password" id="passwordInput" placeholder="Şifrenizi girin" autocomplete="off">
                    <button class="toggle-password" onclick="togglePassword()">👁️</button>
                </div>
                <button class="login-btn" onclick="login()">Giriş Yap</button>

        <!-- CHAT SCREEN -->
        <div class="chat-screen" id="chatScreen">
            <div class="header">

                <div class="profile-photo" id="profilePhoto" onclick="showContactInfo()">
                    <span>💕</span>
                </div>
                <div class="header-info">
                    <h2 onclick="changePartnerName()">
                        <span id="partnerNameDisplay">...</span>
                        <span style="font-size: 12px;">✏️</span>
                    </h2>
                    <p id="statusText">çevrimiçi</p>
                </div>
                <div class="header-actions">
                    <button class="header-btn" onclick="toggleTheme()">🌓</button>
                    <button class="header-btn" onclick="clearChat()">🗑️</button>
                    <button class="header-btn" onclick="showContactInfo()">ℹ️</button>
                </div>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div class="input-area">
                <button class="input-btn" onclick="openAttachmentModal()">📎</button>

        <!-- CONTACT PANEL -->
        <div class="contact-panel" id="contactPanel">
            <div class="contact-header">
                <button onclick="closeContactInfo()" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">✕</button>
                <div style="flex: 1;"></div>
            </div>
            <div style="background: var(--header-bg); padding: 0 20px 30px; text-align: center;">
                <div class="contact-avatar" id="contactAvatar">
                    <span style="font-size: 40px;">💕</span>
                </div>
                <h2 style="color: white; margin-top: 15px;" id="contactName">...</h2>
                <p style="color: rgba(255,255,255,0.7);">+90 5XX XXX XX XX</p>
            </div>
            <div style="flex: 1; padding: 20px;">
                <button class="modal-btn danger" onclick="clearChat()" style="margin-top: 20px;">🗑️ Sohbeti Temizle</button>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div class="modal" id="attachmentModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">Dosya Gönder</h3>
            <button class="modal-btn primary" onclick="document.getElementById('fileInput').click()">🖼️ Galeriden Seç</button>
            <button class="modal-btn primary" onclick="sendLocation()">📍 Konum Paylaş</button>
            <button class="modal-btn secondary" onclick="closeAttachmentModal()">İptal</button>
        </div>
    </div>

    <div class="modal" id="nameModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">İsim Değiştir</h3>
            <input type="text" id="nameInput" placeholder="Yeni isim..." style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 15px;">
            <button class="modal-btn primary" onclick="savePartnerName()">Kaydet</button>
            <button class="modal-btn secondary" onclick="closeNameModal()">İptal</button>
        </div>
    </div>

    <div class="recording-overlay" id="recordingOverlay">
        <div class="recording-circle">🎙️</div>
        <div class="recording-time" id="recordingTime">00:00</div>
        <div style="color: rgba(255,255,255,0.7); margin-top: 10px;">Bırakmak için bırakın</div>
    </div>

    <div class="image-viewer" id="imageViewer" onclick="closeImageViewer()">
        <button class="image-viewer-close">✕</button>
        <img id="viewerImage" src="" alt="">
    </div>

    <div class="context-menu" id="contextMenu">
        <div class="context-item" onclick="replyToMessage()">💬 Yanıtla</div>
        <div class="context-item" onclick="deleteMessage()" style="color: #ff4444;">🗑️ Sil</div>
    </div>

    <div class="toast" id="toast"></div>

    <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">

    <!-- FIREBASE & APP LOGIC -->
    <script type="module">
        // FIREBASE IMPORT
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        console.log("Script başladı!");

        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBZYnpMlDoz2wnk9PnPrSr_usoSSq8Xkow",
            authDomain: "berat-enes-sohbet.firebaseapp.com",
            databaseURL: "https://berat-enes-sohbet-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "berat-enes-sohbet",
            storageBucket: "berat-enes-sohbet.appspot.com",
            messagingSenderId: "661287110483",
            appId: "1:661287110483:web:9bb02c8cd560dea964c3a6"
        };

        // INIT FIREBASE
        let app, db;
        try {
            app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            console.log("Firebase bağlandı!");
        } catch (e) {
            console.error("Firebase hatası:", e);
            alert("İnternet bağlantınızı kontrol edin!");
        }

        // GLOBAL VARS
        let currentUser = null;
        let messagesRef = null;
        let typingRef = null;
        let selectedMessage = null;
        let recordingInterval = null;
        let recordingSeconds = 0;
        let mediaRecorder = null;
        let audioChunks = [];

        const USERS = {
            'berat1': { name: 'Berat', partner: 'Enes', theme: { primary: '#128C7E', headerBg: '#075E54', messageMe: '#DCF8C6' }},
            'enes1': { name: 'Enes', partner: 'Berat', theme: { primary: '#EE5A6F', headerBg: '#EE5A6F', messageMe: '#FFD4D4' }}
        };

        // GÜN SAYACI
        const startDate = new Date('2025-01-09');
        const today = new Date();
        const days = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
        document.getElementById('dayCount').textContent = days;

        // ŞİFRE GÖSTER/GİZLE
        window.togglePassword = function() {
            const input = document.getElementById('passwordInput');
            const btn = document.querySelector('.toggle-password');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        };

        // LOGIN - DÜZELTİLMİŞ
        window.login = function() {
            console.log("Login tıklandı!");
            
            const input = document.getElementById('passwordInput');
            const password = input.value.toLowerCase().trim();
            const loginBox = document.querySelector('.login-box');
            const errorText = document.getElementById('errorText');
            
            console.log("Girilen şifre:", password);
            
            // Şifre kontrolü
            if (!USERS[password]) {
                console.log("Şifre yanlış!");
                loginBox.classList.add('shake');
                errorText.style.display = 'block';
                setTimeout(() => {
                    loginBox.classList.remove('shake');
                    errorText.style.display = 'none';
                    input.value = '';
                }, 1000);
                return;
            }
            
            console.log("Şifre doğru! Kullanıcı:", USERS[password].name);
            
            // Kullanıcı ayarla
            currentUser = USERS[password];
            
            // Firebase referansları
            messagesRef = ref(db, "mesajlar");
            typingRef = ref(db, "typing/" + currentUser.name);
            
            // Temayı uygula
            const theme = currentUser.theme;
            document.documentElement.style.setProperty('--primary-color', theme.primary);
            document.documentElement.style.setProperty('--header-bg', theme.headerBg);
            document.documentElement.style.setProperty('--message-me', theme.messageMe);
            
            // Karanlık mod kontrolü
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.setAttribute('data-theme', 'dark');
            }
            
            // Kayıtlı ismi yükle
            const savedName = localStorage.getItem('partnerName_' + currentUser.name);
            if (savedName) {
                currentUser.partner = savedName;
            }
            
            // Ekranları değiştir
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            
            // İsimleri göster
            document.getElementById('partnerNameDisplay').textContent = currentUser.partner;
            document.getElementById('contactName').textContent = currentUser.partner;
            
            // Mesajları yükle
            loadMessages();
            setupTypingListener();
            
            console.log("Giriş başarılı!");
            showToast('Hoş geldin ' + currentUser.name + '!');
        };

        // ENTER İLE GİRİŞ
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        // LOGOUT
        window.logout = function() {
            if (typingRef) set(typingRef, false);
            currentUser = null;
            messagesRef = null;
            typingRef = null;
            document.getElementById('chatScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('passwordInput').value = '';
        };

        // PARTNER İSİM DEĞİŞTİRME
        window.changePartnerName = function() {
            if (!currentUser) return;
            document.getElementById('nameInput').value = currentUser.partner;
            document.getElementById('nameModal').classList.add('active');
        };

        window.savePartnerName = function() {
            const newName = document.getElementById('nameInput').value.trim();
            if (newName && currentUser) {
                currentUser.partner = newName;
                localStorage.setItem('partnerName_' + currentUser.name, newName);
                document.getElementById('partnerNameDisplay').textContent = newName;
                document.getElementById('contactName').textContent = newName;
                showToast('İsim değiştirildi!');
            }
            document.getElementById('nameModal').classList.remove('active');
        };

        window.closeNameModal = function() {
            document.getElementById('nameModal').classList.remove('active');
        };

        // TEMA DEĞİŞTİRME
        window.toggleTheme = function() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('darkMode', 'false');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('darkMode', 'true');
            }
        };

        // YAZIYOR... GÖSTERGESİ
        let typingTimeout;
        window.handleTyping = function() {
            if (!currentUser || !typingRef) return;
            set(typingRef, true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                if (typingRef) set(typingRef, false);
            }, 3000);
        };

        function setupTypingListener() {
            if (!currentUser) return;
            const partnerTypingRef = ref(db, "typing/" + currentUser.partner);
            onValue(partnerTypingRef, (snapshot) => {
                const isTyping = snapshot.val();
                const statusText = document.getElementById('statusText');
                if (isTyping) {
                    statusText.textContent = 'yazıyor...';
                    statusText.classList.add('typing-indicator');
                } else {
                    statusText.textContent = 'çevrimiçi';
                    statusText.classList.remove('typing-indicator');
                }
            });
        }

        // MESAJ GÖNDERME
        window.sendMessage = function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            if (!currentUser) {
                showToast('Önce giriş yapın!');
                return;
            }
            
            try {
                push(messagesRef, {
                    sender: currentUser.name,
                    type: 'text',
                    content: text,
                    time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}),
                    date: new Date().toLocaleDateString('tr-TR'),
                    timestamp: Date.now()
                });
                
                input.value = '';
                if (typingRef) set(typingRef, false);
                input.blur();
            } catch (e) {
                console.error("Mesaj hatası:", e);
                showToast('Mesaj gönderilemedi!');
            }
        };

        // ENTER İLE MESAJ
        window.handleKeyPress = function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        };

        // SESLİ MESAJ
        window.startRecording = async function() {
            if (!currentUser) {
                showToast('Önce giriş yapın!');
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        push(messagesRef, {
                            sender: currentUser.name,
                            type: 'audio',
                            content: e.target.result,
                            duration: recordingSeconds,
                            time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}),
                            date: new Date().toLocaleDateString('tr-TR'),
                            timestamp: Date.now()
                        });
                    };
                    reader.readAsDataURL(audioBlob);
                };
                
                mediaRecorder.start();
                recordingSeconds = 0;
                document.getElementById('recordingOverlay').classList.add('active');
                document.getElementById('micBtn').classList.add('recording');
                
                recordingInterval = setInterval(() => {
                    recordingSeconds++;
                    const mins = Math.floor(recordingSeconds / 60).toString().padStart(2, '0');
                    const secs = (recordingSeconds % 60).toString().padStart(2, '0');
                    document.getElementById('recordingTime').textContent = `${mins}:${secs}`;
                }, 1000);
            } catch (err) {
                showToast('Mikrofon erişimi reddedildi');
            }
        };

        window.stopRecording = function() {
            if (!mediaRecorder) return;
            clearInterval(recordingInterval);
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            document.getElementById('recordingOverlay').classList.remove('active');
            document.getElementById('micBtn').classList.remove('recording');
            mediaRecorder = null;
        };

        // KONUM
        window.sendLocation = function() {
            if (!currentUser) {
                showToast('Önce giriş yapın!');
                return;
            }
            
            if (!navigator.geolocation) {
                showToast('Konum desteklenmiyor');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    push(messagesRef, {
                        sender: currentUser.name,
                        type: 'location',
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}),
                        date: new Date().toLocaleDateString('tr-TR'),
                        timestamp: Date.now()
                    });
                    closeAttachmentModal();
                    showToast('Konum paylaşıldı');
                },
                () => showToast('Konum alınamadı')
            );
        };

        // DOSYA EKLEME
        window.openAttachmentModal = function() {
            document.getElementById('attachmentModal').classList.add('active');
        };

        window.closeAttachmentModal = function() {
            document.getElementById('attachmentModal').classList.remove('active');
        };

        window.handleImageUpload = function(event) {
            const file = event.target.files[0];
            if (!file || !currentUser) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                push(messagesRef, {
                    sender: currentUser.name,
                    type: 'image',
                    content: e.target.result,
                    time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}),
                    date: new Date().toLocaleDateString('tr-TR'),
                    timestamp: Date.now()
                });
            };
            reader.readAsDataURL(file);
            closeAttachmentModal();
        };

        // MESAJLARI YÜKLE
        function loadMessages() {
            if (!messagesRef) return;
            
            onValue(messagesRef, (snapshot) => {
                const container = document.getElementById('messages');
                container.innerHTML = '';
                const data = snapshot.val();
                
                if (!data) {
                    container.innerHTML = '<div style="text-align: center; color: #666; padding: 60px 20px;"><div style="font-size: 60px; margin-bottom: 20px;">💕</div><h3>Mesajlaşmaya başlayın</h3></div>';
                    return;
                }

                let currentDate = '';
                Object.entries(data).sort((a,b) => a[1].timestamp - b[1].timestamp).forEach(([msgId, msg]) => {
                    if (msg.date !== currentDate) {
                        currentDate = msg.date;
                        container.innerHTML += `<div class="date-badge">${currentDate}</div>`;
                    }
                    
                    const isMe = msg.sender === currentUser.name;
                    const cssClass = isMe ? 'me' : 'partner';
                    
                    let contentHTML = '';
                    if (msg.type === 'image') {
                        contentHTML = `<img src="${msg.content}" class="message-image" onclick="viewImage('${msg.content}')">`;
                    } else if (msg.type === 'audio') {
                        contentHTML = `<div style="display:flex;align-items:center;gap:10px;"><button onclick="playAudio('${msg.content}', this)" style="width:40px;height:40px;border-radius:50%;background:var(--primary-color);color:white;border:none;">▶️</button><span>${Math.floor(msg.duration/60)}:${(msg.duration%60).toString().padStart(2,'0')}</span></div>`;
                    } else if (msg.type === 'location') {
                        contentHTML = `<div onclick="window.open('https://maps.google.com/?q=${msg.lat},${msg.lng}')" style="cursor:pointer;"><div style="font-size:40px;text-align:center;">📍</div><div style="text-align:center;">Konum</div></div>`;
                    } else {
                        contentHTML = `<div>${msg.content.replace(/</g, '&lt;')}</div>`;
                    }
                    
                    container.innerHTML += `
                        <div class="message-wrapper ${cssClass}" data-id="${msgId}">
                            <div class="message ${cssClass}" oncontextmenu="showContextMenu(event, '${msgId}')">
                                ${contentHTML}
                                <div class="message-time">${msg.time} ${isMe ? '<span class="message-status">✓✓</span>' : ''}</div>
                            </div>
                        </div>`;
                });
                
                container.scrollTop = container.scrollHeight;
            });
        }

            if (!USERS[password]) {
                console.log("Şifre yanlış!");
                loginBox.classList.add('shake');
                errorText.style.display = 'block';
                setTimeout(() => {
                    loginBox.classList.remove('shake');
                    errorText.style.display = 'none';
                    input.value = '';
                }, 1000);
                return;
            }
            
            console.log("Şifre doğru! Kullanıcı:", USERS[password].name);
            
            // Kullanıcı ayarla
            currentUser = USERS[password];
            
            // Firebase referansları
            messagesRef = ref(db, "mesajlar");
            typingRef = ref(db, "typing/" + currentUser.name);
            
            // Temayı uygula
            const theme = currentUser.theme;
            document.documentElement.style.setProperty('--primary-color', theme.primary);
            document.documentElement.style.setProperty('--header-bg', theme.headerBg);
            document.documentElement.style.setProperty('--message-me', theme.messageMe);
            
            // Karanlık mod kontrolü
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.setAttribute('data-theme', 'dark');
            }
            
            // Kayıtlı ismi yükle
            const savedName = localStorage.getItem('partnerName_' + currentUser.name);
            if (savedName) {
                currentUser.partner = savedName;
            }
            
            // Ekranları değiştir
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            
            // İsimleri göster
            document.getElementById('partnerNameDisplay').textContent = currentUser.partner;
            document.getElementById('contactName').textContent = currentUser.partner;
            
            // Mesajları yükle
            loadMessages();
            setupTypingListener();
            
            console.log("Giriş başarılı!");
            showToast('Hoş geldin ' + currentUser.name + '!');
        };

        // ENTER İLE GİRİŞ
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        // LOGOUT
        window.logout = function() {
            if (typingRef) set(typingRef, false);
            currentUser = null;
            messagesRef = null;
            typingRef = null;
            document.getElementById('chatScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('passwordInput').value = '';
        };

        // PARTNER İSİM DEĞİŞTİRME
        window.changePartnerName = function() {
            if (!currentUser) return;
            document.getElementById('nameInput').value = currentUser.partner;
            document.getElementById('nameModal').classList.add('active');
        };

        window.savePartnerName = function() {
            const newName = document.getElementById('nameInput').value.trim();
            if (newName && currentUser) {
                currentUser.partner = newName;
                localStorage.setItem('partnerName_' + currentUser.name, newName);
                document.getElementById('partnerNameDisplay').textContent = newName;
                document.getElementById('contactName').textContent = newName;
                showToast('İsim değiştirildi!');
            }
            document.getElementById('nameModal').classList.remove('active');
        };

        window.closeNameModal = function() {
            document.getElementById('nameModal').classList.remove('active');
        };

        // TEMA DEĞİŞTİRME
        window.toggleTheme = function() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('darkMode', 'false');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('darkMode', 'true');
            }
        };

        // YAZIYOR... GÖSTERGESİ
        let typingTimeout;
        window.handleTyping = function() {
            if (!currentUser || !typingRef) return;
            set(typingRef, true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                if (typingRef) set(typingRef, false);
            }, 3000);
        };

        function setupTypingListener() {
            if (!currentUser) return;
            const partnerTypingRef = ref(db, "typing/" + currentUser.partner);
            onValue(partnerTypingRef, (snapshot) => {
                const isTyping = snapshot.val();
                const statusText = document.getElementById('statusText');
                if (isTyping) {
                    statusText.textContent = 'yazıyor...';
                    statusText.classList.add('typing-indicator');
                } else {
                    statusText.textContent = 'çevrimiçi';
                    statusText.classList.remove('typing-indicator');
                }
            });
        }

        // MESAJ GÖNDERME
        window.sendMessage = function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            if (!currentUser) {
                showToast('Önce giriş yapın!');
                return;
            }
            
            try {
                push(messagesRef, {
                    sender: currentUser.name,
                    type: 'text',
                    content: text,
                    time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}),
                    date: new Date().toLocaleDateString('tr-TR'),
                    timestamp: Date.now()
                });
                
                input.value = '';
                if (typingRef) set(typingRef, false);
                input.blur();
            } catch (e) {
                console.error("Mesaj hatası:", e);
                showToast('Mesaj gönderilemedi!');
            }
        };

        // ENTER İLE MESAJ
        window.handleKeyPress = function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        };

        // SESLİ MESAJ
        window.startRecording = async function() {
            if (!currentUser) {
                showToast('Önce giriş yapın!');
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        push(messagesRef, {
                            sender: currentUser.name,
                            type: 'audio',
                            content: e.target.result,
                            duration: recordingSeconds,
                            time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}),
                            date: new Date().toLocaleDateString('tr-TR'),
                            timestamp: Date.now()
                        });
                    };
                    reader.readAsDataURL(audioBlob);
                };
                
                mediaRecorder.start();
                recordingSeconds = 0;
                document.getElementById('recordingOverlay').classList.add('active');
                document.getElementById('micBtn').classList.add('recording');
                
                recordingInterval = setInterval(() => {
                    recordingSeconds++;
                    const mins = Math.floor(recordingSeconds / 60).toString().padStart(2, '0');
                    const secs = (recordingSeconds % 60).toString().padStart(2, '0');
                    document.getElementById('recordingTime').textContent = `${mins}:${secs}`;
                }, 1000);
            } catch (err) {
                showToast('Mikrofon erişimi reddedildi');
            }
        };

        window.stopRecording = function() {
            if (!mediaRecorder) return;
            clearInterval(recordingInterval);
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            document.getElementById('recordingOverlay').classList.remove('active');
            document.getElementById('micBtn').classList.remove('recording');
            mediaRecorder = null;
        };

        // KONUM
        window.sendLocation = function() {
            if (!currentUser) {
                showToast('Önce giriş yapın!');
                return;
            }
            
            if (!navigator.geolocation) {
                showToast('Konum desteklenmiyor');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    push(messagesRef, {
                        sender: currentUser.name,
                        type: 'location',
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}),
                        date: new Date().toLocaleDateString('tr-TR'),
                        timestamp: Date.now()
                    });
                    closeAttachmentModal();
                    showToast('Konum paylaşıldı');
                },
                () => showToast('Konum alınamadı')
            );
        };

        // DOSYA EKLEME
        window.openAttachmentModal = function() {
            document.getElementById('attachmentModal').classList.add('active');
        };

        window.closeAttachmentModal = function() {
            document.getElementById('attachmentModal').classList.remove('active');
        };

        window.handleImageUpload = function(event) {
            const file = event.target.files[0];
            if (!file || !currentUser) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                push(messagesRef, {
                    sender: currentUser.name,
                    type: 'image',
                    content: e.target.result,
                    time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}),
                    date: new Date().toLocaleDateString('tr-TR'),
                    timestamp: Date.now()
                });
            };
            reader.readAsDataURL(file);
            closeAttachmentModal();
        };

        // MESAJLARI YÜKLE
        function loadMessages() {
            if (!messagesRef) return;
            
            onValue(messagesRef, (snapshot) => {
                const container = document.getElementById('messages');
                container.innerHTML = '';
                const data = snapshot.val();
                
                if (!data) {
                    container.innerHTML = '<div style="text-align: center; color: #666; padding: 60px 20px;"><div style="font-size: 60px; margin-bottom: 20px;">💕</div><h3>Mesajlaşmaya başlayın</h3></div>';
                    return;
                }

                let currentDate = '';
                Object.entries(data).sort((a,b) => a[1].timestamp - b[1].timestamp).forEach(([msgId, msg]) => {
                    if (msg.date !== currentDate) {
                        currentDate = msg.date;
                        container.innerHTML += `<div class="date-badge">${currentDate}</div>`;
                    }
                    
                    const isMe = msg.sender === currentUser.name;
                    const cssClass = isMe ? 'me' : 'partner';
                    
                    let contentHTML = '';
                    if (msg.type === 'image') {
                        contentHTML = `<img src="${msg.content}" class="message-image" onclick="viewImage('${msg.content}')">`;
                    } else if (msg.type === 'audio') {
                        contentHTML = `<div style="display:flex;align-items:center;gap:10px;"><button onclick="playAudio('${msg.content}', this)" style="width:40px;height:40px;border-radius:50%;background:var(--primary-color);color:white;border:none;">▶️</button><span>${Math.floor(msg.duration/60)}:${(msg.duration%60).toString().padStart(2,'0')}</span></div>`;
                    } else if (msg.type === 'location') {
                        contentHTML = `<div onclick="window.open('https://maps.google.com/?q=${msg.lat},${msg.lng}')" style="cursor:pointer;"><div style="font-size:40px;text-align:center;">📍</div><div style="text-align:center;">Konum</div></div>`;
                    } else {
                        contentHTML = `<div>${msg.content.replace(/</g, '&lt;')}</div>`;
                    }
                    
                    container.innerHTML += `
                        <div class="message-wrapper ${cssClass}" data-id="${msgId}">
                            <div class="message ${cssClass}" oncontextmenu="showContextMenu(event, '${msgId}')">
                                ${contentHTML}
                                <div class="message-time">${msg.time} ${isMe ? '<span class="message-status">✓✓</span>' : ''}</div>
                            </div>
                        </div>`;
                });
                
                container.scrollTop = container.scrollHeight;
            });
        }

        window.playAudio = function(url, btn) {
            const audio = new Audio(url);
            audio.play();
            btn.textContent = '⏸️';
            audio.onended = () => btn.textContent = '▶️';
        };

        window.viewImage = function(url) {
            document.getElementById('viewerImage').src = url;
            document.getElementById('imageViewer').classList.add('active');
        };

        window.closeImageViewer = function() {
            document.getElementById('imageViewer').classList.remove('active');
        };

        // CONTEXT MENU
        window.showContextMenu = function(e, msgId) {
            e.preventDefault();
            selectedMessage = msgId;
            const menu = document.getElementById('contextMenu');
            menu.style.left = Math.min(e.pageX, window.innerWidth - 150) + 'px';
            menu.style.top = Math.min(e.pageY, window.innerHeight - 100) + 'px';
            menu.classList.add('active');
        };

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.context-menu')) {
                document.getElementById('contextMenu').classList.remove('active');
            }
        });

        window.replyToMessage = function() {
            document.getElementById('contextMenu').classList.remove('active');
            showToast('Yanıtlama aktif');
        };

        window.deleteMessage = function() {
            if (!selectedMessage) return;
            if (confirm('Bu mesajı silmek istiyor musunuz?')) {
                remove(ref(db, `mesajlar/${selectedMessage}`));
                showToast('Mesaj silindi');
            }
            document.getElementById('contextMenu').classList.remove('active');
        };

        // SOHBET TEMİZLEME
        window.clearChat = function() {
            if (!currentUser) return;
            if (confirm('Tüm sohbet silinsin mi?')) {
                remove(messagesRef);
                showToast('Sohbet temizlendi');
            }
        };

        // İLETİŞİM BİLGİLERİ
        window.showContactInfo = function() {
            document.getElementById('contactPanel').classList.add('active');
        };

        window.closeContactInfo = function() {
            document.getElementById('contactPanel').classList.remove('active');
        };

        // TOAST
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Input event listener
        const msgInput = document.getElementById('messageInput');
        if (msgInput) {
            msgInput.addEventListener('input', handleTyping);
        }

        console.log("Tüm fonksiyonlar yüklendi!");
    </script>
</body>
</html>
