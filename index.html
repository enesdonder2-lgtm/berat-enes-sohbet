<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Berat ❤️ Enes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; height: 100vh; max-width: 430px; background: #1c1c1e; display: flex; flex-direction: column; position: relative; }
        .login-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #1c1c1e 0%, #2c2c2e 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .login-box { background: #2c2c2e; padding: 40px 30px; border-radius: 20px; text-align: center; width: 100%; }
        .login-box h1 { color: #fff; font-size: 32px; margin-bottom: 10px; }
        .login-box p { color: #8e8e93; margin-bottom: 40px; }
        .login-box input { width: 100%; padding: 18px; background: #1c1c1e; border: 1px solid #3a3a3c; border-radius: 12px; color: #fff; font-size: 18px; text-align: center; margin-bottom: 15px; }
        .login-btn { width: 100%; padding: 18px; background: #007aff; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; }
        .error { color: #ff3b30; margin-top: 15px; display: none; }
        .chat-screen { display: none; flex-direction: column; height: 100%; }
        .chat-screen.active { display: flex; }
        .header { background: #1c1c1e; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid #3a3a3c; padding-top: 50px; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #007aff 0%, #5856d6 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .header-info h2 { color: #fff; font-size: 17px; }
        .header-info p { color: #34c759; font-size: 13px; }
        .clear-btn { background: #ff3b30; color: white; border: none; padding: 10px 16px; border-radius: 10px; font-size: 14px; }
        .messages { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 8px; background: #000; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 20px; word-wrap: break-word; font-size: 16px; }
        .message.me { align-self: flex-end; background: #007aff; color: white; border-bottom-right-radius: 6px; }
        .message.partner { align-self: flex-start; background: #2c2c2e; color: #fff; border-bottom-left-radius: 6px; }
        .message-sender { font-size: 12px; opacity: 0.8; margin-bottom: 3px; font-weight: 600; }
        .message-time { font-size: 11px; opacity: 0.7; margin-top: 4px; text-align: right; }
        .input-area { background: #1c1c1e; padding: 12px 15px 30px; border-top: 0.5px solid #3a3a3c; }
        .input-info { color: #8e8e93; font-size: 13px; margin-bottom: 10px; text-align: center; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        .message-input { flex: 1; padding: 14px 18px; background: #2c2c2e; border: none; border-radius: 22px; color: #fff; font-size: 17px; }
        .send-btn { width: 44px; height: 44px; background: #007aff; border: none; border-radius: 50%; color: white; font-size: 20px; }
        .emoji-bar { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; }
        .emoji-btn { background: #2c2c2e; border: none; border-radius: 12px; padding: 10px 14px; font-size: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-screen" id="loginScreen">
            <div class="login-box">
                <h1>💕</h1>
                <p>Berat ❤️ Enes</p>
                <input type="text" id="passwordInput" placeholder="Şifre">
                <button class="login-btn" onclick="login()">Giriş Yap</button>
                <div class="error" id="errorMsg">Yanlış şifre!</div>
                <p style="color: #666; font-size: 13px; margin-top: 15px;">berat1 veya enes1</p>
            </div>
        </div>
        <div class="chat-screen" id="chatScreen">
            <div class="header">
                <div class="header-left">
                    <div class="avatar">💕</div>
                    <div class="header-info">
                        <h2 id="chatTitle">...</h2>
                        <p>Çevrimiçi</p>
                    </div>
                </div>
                <button class="clear-btn" onclick="clearChat()">Sil</button>
            </div>
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <div class="input-info" id="inputInfo">...</div>
                <div class="input-row">
                    <input type="text" class="message-input" id="messageInput" placeholder="Mesaj...">
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
                <div class="emoji-bar">
                    <button class="emoji-btn" onclick="addEmoji('❤️')">❤️</button>
                    <button class="emoji-btn" onclick="addEmoji('💕')">💕</button>
                    <button class="emoji-btn" onclick="addEmoji('😘')">😘</button>
                    <button class="emoji-btn" onclick="addEmoji('😍')">😍</button>
                    <button class="emoji-btn" onclick="addEmoji('🥰')">🥰</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        var USERS = {
            'berat1': { name: 'Berat', partner: 'Enes' },
            'enes1': { name: 'Enes', partner: 'Berat' }
        };
        var currentUser = null;
        var messages = JSON.parse(localStorage.getItem('chatMessages')) || [];
        
        function login() {
            var input = document.getElementById('passwordInput').value.toLowerCase().trim();
            if (USERS[input]) {
                currentUser = USERS[input];
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('chatScreen').style.display = 'flex';
                document.getElementById('chatTitle').textContent = currentUser.name + ' ❤️ ' + currentUser.partner;
                document.getElementById('inputInfo').textContent = currentUser.partner + ' ile konuşuyorsunuz';
                showMessages();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
        
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
        
        function addEmoji(emoji) {
            document.getElementById('messageInput').value += emoji;
        }
        
        function sendMessage() {
            if (!currentUser) return;
            var text = document.getElementById('messageInput').value.trim();
            if (!text) return;
            var msg = {
                sender: currentUser.name,
                text: text,
                time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'})
            };
            messages.push(msg);
            localStorage.setItem('chatMessages', JSON.stringify(messages));
            document.getElementById('messageInput').value = '';
            showMessages();
        }
        
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
        
        function showMessages() {
            if (!currentUser) return;
            var container = document.getElementById('messages');
            if (messages.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #666; padding: 60px 20px;"><div style="font-size: 60px; margin-bottom: 20px;">💕</div><h3 style="color: #fff; margin-bottom: 10px;">Hoş Geldiniz</h3><p>Mesajlaşmaya başlayın</p></div>';
                return;
            }
            var html = '';
            for (var i = 0; i < messages.length; i++) {
                var m = messages[i];
                var isMe = m.sender === currentUser.name;
                html += '<div class="message ' + (isMe ? 'me' : 'partner') + '">';
                html += '<div class="message-sender">' + m.sender + '</div>';
                html += '<div>' + m.text.replace(/</g, '&lt;') + '</div>';
                html += '<div class="message-time">' + m.time + '</div>';
                html += '</div>';
            }
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }
        
        function clearChat() {
            if (confirm('Tüm mesajlar silinsin mi?')) {
                messages = [];
                localStorage.removeItem('chatMessages');
                showMessages();
            }
        }
    </script>
</body>
</html>
