<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Berat ❤️ Enes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary-color: #128C7E;
            --header-bg: #075E54;
            --bg-color: #E5DDD5;
            --message-me: #DCF8C6;
            --message-partner: #fff;
            --text-color: #000;
            --secondary-text: rgba(255,255,255,0.7);
            --input-bg: #F0F0F0;
        }
        [data-theme="dark"] {
            --bg-color: #0f1419;
            --message-me: #005c4b;
            --message-partner: #202c33;
            --text-color: #fff;
            --input-bg: #2a3942;
        }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            height: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            color: var(--text-color);
        }
        .container {
            height: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.06;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.93 0 3.5-1.57 3.5-3.5S13.93 53 12 53s-3.5 1.57-3.5 3.5S10.07 60 12 60z' fill='%23000' fill-opacity='1' fill-rule='evenodd'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }
        
        .login-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .login-box {
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 350px;
            width: 90%;
        }
        .login-box h1 { font-size: 60px; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 18px; margin-bottom: 30px; font-weight: 600; }
        .day-counter {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        .day-counter .number { font-size: 48px; font-weight: bold; }
        .day-counter .label { font-size: 14px; opacity: 0.9; }
        .password-input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        .password-input-wrapper input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            -webkit-appearance: none;
        }
        .password-input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            -webkit-appearance: none;
        }
        .login-btn:active { transform: scale(0.98); }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            position: relative;
            z-index: 1;
        }
        .header {
            background: var(--header-bg);
            color: white;
            padding: 10px 16px;
            padding-top: max(10px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }
        .back-btn {
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
            background: none;
            border: none;
            color: white;
        }
        .profile-photo {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }
        .profile-photo img { width: 100%; height: 100%; object-fit: cover; }
        .header-info { flex: 1; }
        .header-info h2 {
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .header-info p { color: var(--secondary-text); font-size: 13px; }
        .typing-indicator { color: #53bdeb !important; font-style: italic; }
        .header-actions { display: flex; gap: 10px; }
        .header-btn {
            color: white;
            font-size: 20px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }
        .date-badge {
            align-self: center;
            background: rgba(0,0,0,0.2);
            color: rgba(255,255,255,0.8);
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            margin: 10px 0;
        }
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            position: relative;
        }
        .message-wrapper.me { align-self: flex-end; }
        .message-wrapper.partner { align-self: flex-start; }
        .message {
            padding: 8px 12px;
            border-radius: 8px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message.me {
            background: var(--message-me);
            color: var(--text-color);
            border-bottom-right-radius: 2px;
        }
        .message.partner {
            background: var(--message-partner);
            color: var(--text-color);
            border-bottom-left-radius: 2px;
        }
        .message-image {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
        }
        .message-time {
            font-size: 11px;
            color: rgba(0,0,0,0.5);
            text-align: right;
            margin-top: 2px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 3px;
        }
        .message-status { color: #53bdeb; font-size: 14px; }
        
        .input-area {
            background: var(--input-bg);
            padding: 10px 12px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            display: flex;
            align-items: flex-end;
            gap: 8px;
            border-top: 1px solid rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .input-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: none;
            color: #54656F;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .input-wrapper { flex: 1; display: flex; flex-direction: column; }
        .input-container {
            background: #fff;
            border-radius: 25px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
        }
        .message-input {
            flex: 1;
            border: none;
            background: none;
            font-size: 16px;
            outline: none;
            color: var(--text-color);
        }
        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        .modal-btn {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .modal-btn.primary { background: var(--primary-color); color: white; }
        .modal-btn.secondary { background: #f0f0f0; color: #333; }
        
        .context-menu {
            position: fixed;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            padding: 10px 0;
            z-index: 3000;
            display: none;
            min-width: 150px;
        }
        .context-menu.active { display: block; }
        .context-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .contact-panel {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; max-width: 400px;
            height: 100%;
            background: var(--bg-color);
            z-index: 1500;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }
        .contact-panel.active { right: 0; }
        .contact-header {
            background: var(--header-bg);
            color: white;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
        }
        .contact-avatar {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .image-viewer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }
        .image-viewer.active { display: flex; }
        .image-viewer img { max-width: 90%; max-height: 80%; border-radius: 10px; }
        .image-viewer-close {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            color: white;
            font-size: 30px;
            background: none;
            border: none;
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 4000;
            opacity: 0;
            transition: all 0.3s;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bg-pattern"></div>
        
        <!-- LOGIN -->
        <div class="login-screen" id="loginScreen">
            <div class="login-box">
                <h1>💕</h1>
                <p class="subtitle">Berat ❤️ Enes</p>
                <div class="day-counter">
                    <div class="number" id="dayCount">HESAPLANIYOR...</div>
                    <div class="label">gündür birlikteyiz</div>
                    <div style="color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 8px;">9 Ocak 2025'ten beri</div>
                </div>
                <div class="password-input-wrapper">
                    <input type="password" id="passwordInput" placeholder="Şifrenizi girin">
                    <button class="toggle-password" onclick="togglePassword()">👁️</button>
                </div>
                <button class="login-btn" onclick="login()">Giriş Yap</button>
            </div>
        </div>
        
        <!-- CHAT -->
        <div class="chat-screen" id="chatScreen">
            <div class="header">
                <button class="back-btn" onclick="logout()">←</button>
                <div class="profile-photo" onclick="showContactInfo()">
                    <span>💕</span>
                </div>
                <div class="header-info">
                    <h2 onclick="changePartnerName()">
                        <span id="partnerNameDisplay">...</span>
                        <span style="font-size: 12px;">✏️</span>
                    </h2>
                    <p id="statusText">çevrimiçi</p>
                </div>
                <div class="header-actions">
                    <button class="header-btn" onclick="toggleTheme()">🌓</button>
                    <button class="header-btn" onclick="clearChat()">🗑️</button>
                    <button class="header-btn" onclick="showContactInfo()">ℹ️</button>
                </div>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div class="input-area">
                <button class="input-btn" onclick="openAttachmentModal()">📎</button>
                <div class="input-wrapper">
                    <div class="input-container">
                        <input type="text" class="message-input" id="messageInput" placeholder="Mesaj yaz...">
                    </div>
                </div>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
        
        <!-- CONTACT PANEL -->
        <div class="contact-panel" id="contactPanel">
            <div class="contact-header">
                <button onclick="closeContactInfo()" style="background: none; border: none; color: white; font-size: 24px;">✕</button>
            </div>
            <div style="background: var(--header-bg); padding: 0 20px 30px; text-align: center;">
                <div class="contact-avatar">
                    <span style="font-size: 40px;">💕</span>
                </div>
                <h2 style="color: white; margin-top: 15px;" id="contactName">...</h2>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div class="modal" id="attachmentModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">Dosya Gönder</h3>
            <button class="modal-btn primary" onclick="document.getElementById('fileInput').click()">🖼️ Galeriden Seç</button>
            <button class="modal-btn primary" onclick="sendLocation()">📍 Konum Paylaş</button>
            <button class="modal-btn secondary" onclick="closeAttachmentModal()">İptal</button>
        </div>
    </div>

    <div class="modal" id="nameModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">İsim Değiştir</h3>
            <input type="text" id="nameInput" placeholder="Yeni isim..." style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 15px;">
            <button class="modal-btn primary" onclick="savePartnerName()">Kaydet</button>
            <button class="modal-btn secondary" onclick="closeNameModal()">İptal</button>
        </div>
    </div>

    <div class="image-viewer" id="imageViewer" onclick="closeImageViewer()">
        <button class="image-viewer-close">✕</button>
        <img id="viewerImage" src="" alt="">
    </div>

    <div class="context-menu" id="contextMenu">
        <div class="context-item" onclick="replyToMessage()">💬 Yanıtla</div>
        <div class="context-item" onclick="deleteMessage()" style="color: #ff4444;">🗑️ Sil</div>
    </div>

    <div class="toast" id="toast"></div>

    <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">

    <!-- SCRIPT - ESKİ TİP (type="module" YOK) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script>
        // GÜN SAYACINI HESAPLA (Sayfa yüklenince hemen)
        var startDate = new Date('2025-01-09');
        var today = new Date();
        var diffTime = Math.abs(today - startDate);
        var diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        document.getElementById('dayCount').textContent = diffDays;
        console.log("Gün sayısı:", diffDays);

        // FIREBASE CONFIG
        var firebaseConfig = {
            apiKey: "AIzaSyBZYnpMlDoz2wnk9PnPrSr_usoSSq8Xkow",
            authDomain: "berat-enes-sohbet.firebaseapp.com",
            databaseURL: "https://berat-enes-sohbet-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "berat-enes-sohbet",
            storageBucket: "berat-enes-sohbet.appspot.com",
            messagingSenderId: "661287110483",
            appId: "1:661287110483:web:9bb02c8cd560dea964c3a6"
        };

        // INIT FIREBASE
        var app = firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        console.log("Firebase başlatıldı!");

        // GLOBAL VARS
        var currentUser = null;
        var messagesRef = null;
        var typingRef = null;
        var selectedMessage = null;

        var USERS = {
            'berat1': { name: 'Berat', partner: 'Enes', theme: { primary: '#128C7E', headerBg: '#075E54', messageMe: '#DCF8C6' }},
            'enes1': { name: 'Enes', partner: 'Berat', theme: { primary: '#EE5A6F', headerBg: '#EE5A6F', messageMe: '#FFD4D4' }}
        };

        // ŞİFRE GÖSTER/GİZLE
        function togglePassword() {
            var input = document.getElementById('passwordInput');
            var btn = document.querySelector('.toggle-password');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        // LOGIN - BASİT VE ANLAŞILIR
        function login() {
            console.log("Login fonksiyonu çalıştı!");
            
            var input = document.getElementById('passwordInput');
            var password = input.value.toLowerCase().trim();
            var loginBox = document.querySelector('.login-box');
            
            console.log("Girilen şifre:", password);
            
            // Şifre kontrolü
            if (!USERS[password]) {
                console.log("Şifre yanlış!");
                loginBox.classList.add('shake');
                setTimeout(function() {
                    loginBox.classList.remove('shake');
                    input.value = '';
                }, 500);
                return;
            }
            
            console.log("Şifre doğru! Kullanıcı:", USERS[password].name);
            
            // Kullanıcı ayarla
            currentUser = USERS[password];
            messagesRef = db.ref("mesajlar");
            typingRef = db.ref("typing/" + currentUser.name);
            
            // Temayı uygula
            var theme = currentUser.theme;
            document.documentElement.style.setProperty('--primary-color', theme.primary);
            document.documentElement.style.setProperty('--header-bg', theme.headerBg);
            document.documentElement.style.setProperty('--message-me', theme.messageMe);
            
            // Karanlık mod kontrolü
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.setAttribute('data-theme', 'dark');
            }
            
            // Kayıtlı ismi yükle
            var savedName = localStorage.getItem('partnerName_' + currentUser.name);
            if (savedName) {
                currentUser.partner = savedName;
            }
            
            // EKRAN DEĞİŞTİR
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            
            // İsimleri göster
            document.getElementById('partnerNameDisplay').textContent = currentUser.partner;
            document.getElementById('contactName').textContent = currentUser.partner;
            
            // Mesajları yükle
            loadMessages();
            setupTypingListener();
            
            console.log("Giriş başarılı!");
            showToast('Hoş geldin ' + currentUser.name + '!');
        }

        // ENTER İLE GİRİŞ
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        // LOGOUT
        function logout() {
            if (typingRef) typingRef.set(false);
            currentUser = null;
            messagesRef = null;
            typingRef = null;
            document.getElementById('chatScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('passwordInput').value = '';
        }

        // PARTNER İSİM DEĞİŞTİRME
        function changePartnerName() {
            if (!currentUser) return;
            document.getElementById('nameInput').value = currentUser.partner;
            document.getElementById('nameModal').classList.add('active');
        }

        function savePartnerName() {
            var newName = document.getElementById('nameInput').value.trim();
            if (newName && currentUser) {
                currentUser.partner = newName;
                localStorage.setItem('partnerName_' + currentUser.name, newName);
                document.getElementById('partnerNameDisplay').textContent = newName;
                document.getElementById('contactName').textContent = newName;
                showToast('İsim değiştirildi!');
            }
            document.getElementById('nameModal').classList.remove('active');
        }

        function closeNameModal() {
            document.getElementById('nameModal').classList.remove('active');
        }

        // TEMA
        function toggleTheme() {
            var isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('darkMode', 'false');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('darkMode', 'true');
            }
        }

        // YAZIYOR...
        var typingTimeout;
        function handleTyping() {
            if (!currentUser || !typingRef) return;
            typingRef.set(true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(function() {
                if (typingRef) typingRef.set(false);
            }, 3000);
        }

        function setupTypingListener() {
            if (!currentUser) return;
            var partnerTypingRef = db.ref("typing/" + currentUser.partner);
            partnerTypingRef.on('value', function(snapshot) {
                var isTyping = snapshot.val();
                var statusText = document.getElementById('statusText');
                if (isTyping) {
                    statusText.textContent = 'yazıyor...';
                    statusText.classList.add('typing-indicator');
                } else {
                    statusText.textContent = 'çevrimiçi';
                    statusText.classList.remove('typing-indicator');
                }
            });
        }

        // MESAJ GÖNDERME
        function sendMessage() {
            var input = document.getElementById('messageInput');
            var text = input.value.trim();
            
            if (!text) return;
            if (!currentUser) {
                showToast('Önce giriş yapın!');
                return;
            }
            
            messagesRef.push({
                sender: currentUser.name,
                type: 'text',
                content: text,
                time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}),
                date: new Date().toLocaleDateString('tr-TR'),
                timestamp: Date.now()
            });
            
            input.value = '';
            if (typingRef) typingRef.set(false);
            input.blur();
        }

        // ENTER İLE MESAJ
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        document.getElementById('messageInput').addEventListener('input', handleTyping);

        // KONUM
        function sendLocation() {
            if (!currentUser) {
                showToast('Önce giriş yapın!');
                return;
            }
            
            if (!navigator.geolocation) {
                showToast('Konum desteklenmiyor');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    messagesRef.push({
                        sender: currentUser.name,
                        type: 'location',
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}),
                        date: new Date().toLocaleDateString('tr-TR'),
                        timestamp: Date.now()
                    });
                    closeAttachmentModal();
                    showToast('Konum paylaşıldı');
                },
                function() {
                    showToast('Konum alınamadı');
                }
            );
        }

        // DOSYA
        function openAttachmentModal() {
            document.getElementById('attachmentModal').classList.add('active');
        }

        function closeAttachmentModal() {
            document.getElementById('attachmentModal').classList.remove('active');
        }

        function handleImageUpload(event) {
            var file = event.target.files[0];
            if (!file || !currentUser) return;
            
            var reader = new FileReader();
            reader.onload = function(e) {
                messagesRef.push({
                    sender: currentUser.name,
                    type: 'image',
                    content: e.target.result,
                    time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}),
                    date: new Date().toLocaleDateString('tr-TR'),
                    timestamp: Date.now()
                });
            };
            reader.readAsDataURL(file);
            closeAttachmentModal();
        }

        // MESAJLARI YÜKLE
        function loadMessages() {
            if (!messagesRef) return;
            
            messagesRef.on('value', function(snapshot) {
                var container = document.getElementById('messages');
                container.innerHTML = '';
                var data = snapshot.val();
                
                if (!data) {
                    container.innerHTML = '<div style="text-align: center; color: #666; padding: 60px 20px;"><div style="font-size: 60px; margin-bottom: 20px;">💕</div><h3>Mesajlaşmaya başlayın</h3></div>';
                    return;
                }

                var currentDate = '';
                var messages = [];
                
                // Object'i array'e çevir ve sırala
                for (var key in data) {
                    if (data.hasOwnProperty(key)) {
                        messages.push({key: key, data: data[key]});
                    }
                }
                messages.sort(function(a, b) {
                    return a.data.timestamp - b.data.timestamp;
                });
                
                messages.forEach(function(msg) {
                    var msgData = msg.data;
                    var msgId = msg.key;
                    
                    if (msgData.date !== currentDate) {
                        currentDate = msgData.date;
                        container.innerHTML += '<div class="date-badge">' + currentDate + '</div>';
                    }
                    
                    var isMe = msgData.sender === currentUser.name;
                    var cssClass = isMe ? 'me' : 'partner';
                    
                    var contentHTML = '';
                    if (msgData.type === 'image') {
                        contentHTML = '<img src="' + msgData.content + '" class="message-image" onclick="viewImage(\'' + msgData.content + '\')">';
                    } else if (msgData.type === 'location') {
                        contentHTML = '<div onclick="window.open(\'https://maps.google.com/?q=' + msgData.lat + ',' + msgData.lng + '\')" style="cursor:pointer;"><div style="font-size:40px;text-align:center;">📍</div><div style="text-align:center;">Konum</div></div>';
                    } else {
                        contentHTML = '<div>' + msgData.content.replace(/</g, '&lt;') + '</div>';
                    }
                    
                    container.innerHTML += 
                        '<div class="message-wrapper ' + cssClass + '" data-id="' + msgId + '" oncontextmenu="showContextMenu(event, \'' + msgId + '\')">' +
                            '<div class="message ' + cssClass + '">' +
                                contentHTML +
                                '<div class="message-time">' + msgData.time + (isMe ? ' <span class="message-status">✓✓</span>' : '') + '</div>' +
                            '</div>' +
                        '</div>';
                });
                
                container.scrollTop = container.scrollHeight;
            });
        }

        function viewImage(url) {
            document.getElementById('viewerImage').src = url;
            document.getElementById('imageViewer').classList.add('active');
        }

        function closeImageViewer() {
            document.getElementById('imageViewer').classList.remove('active');
        }

        function showContextMenu(e, msgId) {
            e.preventDefault();
            selectedMessage = msgId;
            var menu = document.getElementById('contextMenu');
            menu.style.left = Math.min(e.pageX, window.innerWidth - 150) + 'px';
            menu.style.top = Math.min(e.pageY, window.innerHeight - 100) + 'px';
            menu.classList.add('active');
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.context-menu')) {
                document.getElementById('contextMenu').classList.remove('active');
            }
        });

        function replyToMessage() {
            document.getElementById('contextMenu').classList.remove('active');
            showToast('Yanıtlama aktif');
        }

        function deleteMessage() {
            if (!selectedMessage) return;
            if (confirm('Bu mesajı silmek istiyor musunuz?')) {
                db.ref('mesajlar/' + selectedMessage).remove();
                showToast('Mesaj silindi');
            }
            document.getElementById('contextMenu').classList.remove('active');
        }

        function clearChat() {
            if (!currentUser) return;
            if (confirm('Tüm sohbet silinsin mi?')) {
                messagesRef.remove();
                showToast('Sohbet temizlendi');
            }
        }

        function showContactInfo() {
            document.getElementById('contactPanel').classList.add('active');
        }

        function closeContactInfo() {
            document.getElementById('contactPanel').classList.remove('active');
        }

        function showToast(message) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(function() {
                toast.classList.remove('show');
            }, 3000);
        }

        console.log("Tüm scriptler yüklendi!");
    </script>
</body>
</html>
